<!DOCTYPE html>
<html lang="en">
    <head>
    <title>Frontend Mentor | QR code component</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width" />
    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Overpass:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    </head>
    <body role="content">
        <main class="cadre">
            <figure>
                <img src="/images/image-qr-code.png"
                    alt="qr code link to Frontent Mentor web site"  
                    class="picture">
            </figure>
            <section class="text">
                <h1>Improve your front-end skills by building projects</h1>
                <p>Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
            </section>
        </main>
        <footer class="attribution" role="content-info">
            <p>Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
                Coded by <a href="https://github.com/polo372/">polo372</a>.</p>
            </footer>
    </body>
</html>
